<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTSE 100 Live Prices</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header-left h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f0f6fc;
    }

    .header-left .subtitle {
      font-size: 0.75rem;
      color: #6e7681;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .auto-refresh-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: #8b949e;
      cursor: pointer;
      user-select: none;
    }

    .auto-refresh-label input { accent-color: #58a6ff; cursor: pointer; }

    .countdown {
      font-size: 0.78rem;
      color: #58a6ff;
      min-width: 42px;
    }

    #last-updated {
      font-size: 0.78rem;
      color: #6e7681;
      white-space: nowrap;
    }

    .btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) { background: #30363d; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Controls ── */
    .controls {
      padding: 14px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid #21262d;
    }

    .search-input {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 7px 13px;
      border-radius: 6px;
      font-size: 0.875rem;
      width: 260px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: #58a6ff; }
    .search-input::placeholder { color: #484f58; }

    .sort-select {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 7px 13px;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
      outline: none;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 20px;
      padding: 10px 24px;
      font-size: 0.8rem;
      flex-wrap: wrap;
      border-bottom: 1px solid #21262d;
    }

    .stat { display: flex; gap: 5px; align-items: center; }
    .stat-lbl { color: #6e7681; }
    .stat-val { font-weight: 700; }
    .up  { color: #3fb950; }
    .dn  { color: #f85149; }
    .fl  { color: #8b949e; }

    /* ── Table ── */
    .table-wrapper { padding: 0 24px 40px; overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 760px;
    }

    thead { position: sticky; top: 0; z-index: 5; }

    th {
      background: #161b22;
      color: #8b949e;
      font-weight: 600;
      padding: 10px 12px;
      text-align: right;
      border-bottom: 1px solid #30363d;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.1s;
    }

    th:nth-child(1), th:nth-child(2) { text-align: left; }
    th:hover { color: #c9d1d9; }
    th.active { color: #58a6ff; }

    th .arr { font-size: 0.65rem; margin-left: 3px; opacity: 0.7; }

    tbody tr {
      border-bottom: 1px solid #21262d;
      transition: background 0.1s;
    }

    tbody tr:hover { background: #161b22; }

    td {
      padding: 10px 12px;
      text-align: right;
      white-space: nowrap;
      vertical-align: middle;
    }

    td:nth-child(1) {
      text-align: left;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.78rem;
      color: #58a6ff;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    td:nth-child(2) {
      text-align: left;
      color: #c9d1d9;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .price-cell { font-weight: 700; font-variant-numeric: tabular-nums; }

    .pill {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.77rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .pill.up  { background: rgba(63,185,80,.14);  color: #3fb950; }
    .pill.dn  { background: rgba(248,81,73,.13);  color: #f85149; }
    .pill.fl  { background: rgba(139,148,158,.12); color: #8b949e; }

    .vol-cell { color: #8b949e; font-variant-numeric: tabular-nums; }
    .range-cell { color: #8b949e; font-size: 0.8rem; font-variant-numeric: tabular-nums; }

    /* ── Loading / Error ── */
    .loading-box {
      text-align: center;
      padding: 70px 24px;
      color: #8b949e;
    }

    .spinner {
      width: 30px; height: 30px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-note { font-size: 0.75rem; color: #484f58; margin-top: 6px; }

    .error-box {
      background: rgba(248,81,73,.09);
      border: 1px solid rgba(248,81,73,.28);
      border-radius: 8px;
      padding: 16px 20px;
      margin: 20px 24px;
      color: #f85149;
      font-size: 0.875rem;
    }

    .error-box code {
      display: block;
      margin-top: 6px;
      font-size: 0.78rem;
      color: #ff7b72;
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; }
      .controls { flex-direction: column; align-items: stretch; }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>FTSE 100 Live Prices</h1>
    <div class="subtitle">London Stock Exchange &bull; Prices in pence (GBp) &bull; Top 30 by market cap &bull; Data via Finnhub</div>
  </div>
  <div class="header-right">
    <label class="auto-refresh-label">
      <input type="checkbox" id="auto-refresh" checked>
      Auto-refresh
    </label>
    <span class="countdown" id="countdown"></span>
    <span id="last-updated">—</span>
    <button class="btn" id="refresh-btn" onclick="fetchPrices()">↻ Refresh</button>
  </div>
</header>

<div class="controls">
  <input class="search-input" type="text" id="search" placeholder="Search company or ticker…" oninput="renderTable()">
  <select class="sort-select" id="sort-select" onchange="applyDropdownSort()">
    <option value="">Sort: Default (A–Z)</option>
    <option value="change-pct-desc">Biggest Gainers first</option>
    <option value="change-pct-asc">Biggest Losers first</option>
    <option value="price-desc">Price: High → Low</option>
    <option value="price-asc">Price: Low → High</option>
  </select>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="table-wrapper">
  <div class="loading-box" id="loading-box">
    <div class="spinner"></div>
    <div>Fetching FTSE 100 prices…</div>
    <div class="loading-note">Fetching live quotes from Finnhub…</div>
  </div>
  <div id="error-area"></div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th onclick="headerSort('ticker')" id="h-ticker">Ticker <span class="arr" id="a-ticker"></span></th>
        <th onclick="headerSort('name')" id="h-name">Company <span class="arr" id="a-name"></span></th>
        <th onclick="headerSort('price')" id="h-price">Price <span class="arr" id="a-price"></span></th>
        <th onclick="headerSort('change')" id="h-change">Change <span class="arr" id="a-change"></span></th>
        <th onclick="headerSort('changePct')" id="h-changePct">Change % <span class="arr" id="a-changePct"></span></th>
        <th onclick="headerSort('high')" id="h-high">Day High <span class="arr" id="a-high"></span></th>
        <th onclick="headerSort('low')" id="h-low">Day Low <span class="arr" id="a-low"></span></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script>
// ── Finnhub API key ────────────────────────────────────────────────────────
const FINNHUB_KEY = 'd85o28pr01qitd92vcngd85o28pr01qitd92vco0';

// ── Top 30 FTSE 100 by market cap ─────────────────────────────────────────
// Finnhub symbol = 'LSE:' + ticker without '.L'
const FTSE100 = [
  { ticker:'AZN.L',   name:'AstraZeneca' },
  { ticker:'SHEL.L',  name:'Shell' },
  { ticker:'HSBA.L',  name:'HSBC' },
  { ticker:'ULVR.L',  name:'Unilever' },
  { ticker:'RIO.L',   name:'Rio Tinto' },

  { ticker:'GSK.L',   name:'GSK' },
  { ticker:'BATS.L',  name:'British American Tobacco' },
  { ticker:'REL.L',   name:'RELX' },

  { ticker:'GLEN.L',  name:'Glencore' },
  { ticker:'LSEG.L',  name:'London Stock Exchange Group' },

  { ticker:'EXPN.L',  name:'Experian' },
  { ticker:'III.L',   name:'3i Group' },
  { ticker:'BA.L',    name:'BAE Systems' },
  { ticker:'BARC.L',  name:'Barclays' },
  { ticker:'LLOY.L',  name:'Lloyds Banking Group' },
  { ticker:'NWG.L',   name:'NatWest Group' },
  { ticker:'VOD.L',   name:'Vodafone' },
  { ticker:'RR.L',    name:'Rolls-Royce' },
  { ticker:'NG.L',    name:'National Grid' },
  { ticker:'SSE.L',   name:'SSE' },
  { ticker:'BT-A.L',  name:'BT Group' },
  //{ ticker:'TSCO.L',  name:'Tesco' },
  { ticker:'NXT.L',   name:'Next' },
  { ticker:'IMB.L',   name:'Imperial Brands' },
  { ticker:'FLTR.L',  name:'Flutter Entertainment' },
  { ticker:'SMT.L',   name:'Scottish Mortgage Inv. Trust' },
  { ticker:'IAG.L',   name:'International Airlines Group' },
  { ticker:'GSK.L',  name:'GSK' },
  { ticker:'HLMA.L', name:'Halma' },
  { ticker:'HSBA.L', name:'HSBC' },
  { ticker:'HWDN.L', name:'Howden Joinery' },
  { ticker:'IAG.L',  name:'International Airlines Group' },
  { ticker:'ICG.L',  name:'Intermediate Capital Group' },
  { ticker:'IHG.L',  name:'InterContinental Hotels' },
  { ticker:'III.L',  name:'3i Group' },
  { ticker:'IMB.L',  name:'Imperial Brands' },
  { ticker:'INF.L',  name:'Informa' },
  { ticker:'ITRK.L', name:'Intertek' },
  { ticker:'JD.L',   name:'JD Sports Fashion' },
  { ticker:'KGF.L',  name:'Kingfisher' },
  { ticker:'LAND.L', name:'Land Securities' },
  { ticker:'LGEN.L', name:'Legal & General' },
  { ticker:'LLOY.L', name:'Lloyds Banking Group' },
  { ticker:'LMP.L',  name:'LondonMetric Property' },
  { ticker:'LSEG.L', name:'London Stock Exchange Group' },
  { ticker:'MNDI.L', name:'Mondi' },
  { ticker:'MNG.L',  name:'M&G' },
  { ticker:'MRO.L',  name:'Melrose Industries' },
  { ticker:'NG.L',   name:'National Grid' },
  { ticker:'NWG.L',  name:'NatWest Group' },
  { ticker:'NXT.L',  name:'Next' },
  { ticker:'OCDO.L', name:'Ocado' },
  { ticker:'PHNX.L', name:'Phoenix Group' },
  { ticker:'PSON.L', name:'Pearson' },
  { ticker:'PRU.L',  name:'Prudential' },
  { ticker:'PSH.L',  name:'Pershing Square Holdings' },
  { ticker:'PSN.L',  name:'Persimmon' },
  { ticker:'REL.L',  name:'RELX' },
  { ticker:'RIO.L',  name:'Rio Tinto' },
  { ticker:'RKT.L',  name:'Reckitt Benckiser' },
  { ticker:'RMV.L',  name:'Rightmove' },
  { ticker:'RR.L',   name:'Rolls-Royce' },
  { ticker:'RS1.L',  name:'RS Group' },
  { ticker:'SBRY.L', name:"Sainsbury's" },
  { ticker:'SDR.L',  name:'Schroders' },
  { ticker:'SGE.L',  name:'Sage Group' },
  { ticker:'SGRO.L', name:'Segro' },
  { ticker:'SHEL.L', name:'Shell' },
  { ticker:'SMIN.L', name:'Smiths Group' },
  { ticker:'SMT.L',  name:'Scottish Mortgage Inv. Trust' },
  { ticker:'SN.L',   name:'Smith & Nephew' },
  { ticker:'SPX.L',  name:'Spirax Group' },
  { ticker:'SSE.L',  name:'SSE' },
  { ticker:'STJ.L',  name:"St James's Place" },
  { ticker:'SVT.L',  name:'Severn Trent' },
  { ticker:'TSCO.L', name:'Tesco' },
  { ticker:'TW.L',   name:'Taylor Wimpey' },
  { ticker:'ULVR.L', name:'Unilever' },
  { ticker:'UNITE.L',name:'Unite Group' },
  { ticker:'VOD.L',  name:'Vodafone' },
  { ticker:'VTY.L',  name:'Vistry Group' },
  { ticker:'WEIR.L', name:'Weir Group' },
  { ticker:'WPP.L',  name:'WPP' },
  { ticker:'WTB.L',  name:'Whitbread' },
];

// ── State ─────────────────────────────────────────────────────────────────
let stockData      = [];
let sortCol        = 'name';
let sortDir        = 'asc';
let countdownSec   = 60;
let countdownTimer;
let autoRefreshEnabled = true;

// ── Finnhub fetch ──────────────────────────────────────────────────────────
async function finnhubQuote(ticker) {
  const symbol = 'LSE:' + ticker.replace('.L', '');
  const url    = `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(symbol)}&token=${FINNHUB_KEY}`;
  const res    = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function fetchPrices() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  document.getElementById('error-area').innerHTML = '';
  document.getElementById('loading-box').style.display = 'block';
  document.getElementById('main-table').style.display  = 'none';
  resetCountdown();

  try {
    const results = await Promise.allSettled(FTSE100.map(s => finnhubQuote(s.ticker)));

    stockData = FTSE100.map((s, i) => {
      const q = results[i].status === 'fulfilled' ? results[i].value : {};
      return {
        ticker:    s.ticker,
        name:      s.name,
        price:     (q.c != null && q.c !== 0) ? q.c  : null,
        change:    q.d  != null               ? q.d  : null,
        changePct: q.dp != null               ? q.dp : null,
        high:      (q.h != null && q.h !== 0) ? q.h  : null,
        low:       (q.l != null && q.l !== 0) ? q.l  : null,
      };
    });

    document.getElementById('loading-box').style.display = 'none';
    document.getElementById('main-table').style.display  = 'table';
    document.getElementById('last-updated').textContent  =
      'Updated ' + new Date().toLocaleTimeString('en-GB');

    updateStats();
    renderTable();

  } catch (err) {
    document.getElementById('loading-box').style.display = 'none';
    document.getElementById('error-area').innerHTML =
      `<div class="error-box">
        Failed to load prices. The Finnhub API may be temporarily unavailable.
        <code>${err.message}</code>
      </div>`;
  }

  btn.disabled = false;
}

// ── Stats bar ─────────────────────────────────────────────────────────────
function updateStats() {
  const loaded  = stockData.filter(s => s.changePct !== null);
  const gainers = loaded.filter(s => s.changePct > 0).length;
  const losers  = loaded.filter(s => s.changePct < 0).length;
  const flat    = loaded.filter(s => s.changePct === 0).length;
  const best    = [...loaded].sort((a,b) => (b.changePct||0) - (a.changePct||0))[0];
  const worst   = [...loaded].sort((a,b) => (a.changePct||0) - (b.changePct||0))[0];

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><span class="stat-lbl">Loaded:</span><span class="stat-val fl">${loaded.length}/${stockData.length}</span></div>
    <div class="stat"><span class="stat-lbl">Gainers:</span><span class="stat-val up">${gainers}</span></div>
    <div class="stat"><span class="stat-lbl">Losers:</span><span class="stat-val dn">${losers}</span></div>
    <div class="stat"><span class="stat-lbl">Flat:</span><span class="stat-val fl">${flat}</span></div>
    ${best  ? `<div class="stat"><span class="stat-lbl">Best:</span><span class="stat-val up">${best.ticker} +${best.changePct.toFixed(2)}%</span></div>`  : ''}
    ${worst ? `<div class="stat"><span class="stat-lbl">Worst:</span><span class="stat-val dn">${worst.ticker} ${worst.changePct.toFixed(2)}%</span></div>` : ''}
  `;
}

// ── Sorting ───────────────────────────────────────────────────────────────
const COLS = ['ticker','name','price','change','changePct','high','low'];

function headerSort(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = ['price','change','changePct','high','low'].includes(col) ? 'desc' : 'asc';
  }
  document.getElementById('sort-select').value = '';
  renderTable();
}

function applyDropdownSort() {
  const v = document.getElementById('sort-select').value;
  if (!v)                           { sortCol = 'name';      sortDir = 'asc';  }
  else if (v === 'change-pct-desc') { sortCol = 'changePct'; sortDir = 'desc'; }
  else if (v === 'change-pct-asc')  { sortCol = 'changePct'; sortDir = 'asc';  }
  else if (v === 'price-desc')      { sortCol = 'price';     sortDir = 'desc'; }
  else if (v === 'price-asc')       { sortCol = 'price';     sortDir = 'asc';  }
  renderTable();
}

// ── Rendering ─────────────────────────────────────────────────────────────
function renderTable() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  let   rows  = stockData.filter(s =>
    !query ||
    s.ticker.toLowerCase().includes(query) ||
    s.name.toLowerCase().includes(query)
  );

  rows = rows.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (av === null) av = sortDir === 'asc' ? Infinity : -Infinity;
    if (bv === null) bv = sortDir === 'asc' ? Infinity : -Infinity;
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1  : -1;
    return 0;
  });

  COLS.forEach(c => {
    const el = document.getElementById(`h-${c}`);
    const ar = document.getElementById(`a-${c}`);
    if (!el) return;
    el.classList.toggle('active', c === sortCol);
    ar.textContent = c === sortCol ? (sortDir === 'asc' ? '▲' : '▼') : '';
  });

  const tbody = document.getElementById('table-body');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#6e7681;padding:30px">No results</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(s => {
    const dir       = s.changePct > 0 ? 'up' : s.changePct < 0 ? 'dn' : 'fl';
    const sign      = s.change > 0 ? '+' : '';
    const priceStr  = s.price     !== null ? fmt(s.price, 2)           : '—';
    const changeStr = s.change    !== null ? sign + fmt(s.change, 2)   : '—';
    const pctStr    = s.changePct !== null ? sign + fmt(s.changePct, 2) + '%' : '—';
    const highStr   = s.high      !== null ? fmt(s.high, 2)            : '—';
    const lowStr    = s.low       !== null ? fmt(s.low, 2)             : '—';

    return `<tr>
      <td>${s.ticker}</td>
      <td title="${s.name}">${s.name}</td>
      <td class="price-cell ${dir}">${priceStr}</td>
      <td class="change-cell ${dir}">${changeStr}</td>
      <td><span class="pill ${dir}">${pctStr}</span></td>
      <td class="range-cell">${highStr}</td>
      <td class="range-cell">${lowStr}</td>
    </tr>`;
  }).join('');
}

// ── Formatting helper ──────────────────────────────────────────────────────
function fmt(n, dp) {
  return n.toLocaleString('en-GB', { minimumFractionDigits: dp, maximumFractionDigits: dp });
}

// ── Auto-refresh countdown ─────────────────────────────────────────────────
function resetCountdown() {
  clearInterval(countdownTimer);
  countdownSec = 60;
  updateCountdownDisplay();
  if (autoRefreshEnabled) startCountdown();
}

function startCountdown() {
  countdownTimer = setInterval(() => {
    countdownSec--;
    updateCountdownDisplay();
    if (countdownSec <= 0) {
      clearInterval(countdownTimer);
      if (document.getElementById('auto-refresh').checked) fetchPrices();
    }
  }, 1000);
}

function updateCountdownDisplay() {
  const el = document.getElementById('countdown');
  el.textContent = document.getElementById('auto-refresh').checked ? `${countdownSec}s` : '';
}

document.getElementById('auto-refresh').addEventListener('change', function () {
  autoRefreshEnabled = this.checked;
  if (this.checked) {
    startCountdown();
  } else {
    clearInterval(countdownTimer);
    document.getElementById('countdown').textContent = '';
  }
});

// ── Init ──────────────────────────────────────────────────────────────────
fetchPrices();
</script>
</body>
</html>
